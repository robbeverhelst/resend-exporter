groups:
  - name: resend-exporter
    rules:
      - alert: ResendEmailFailed
        expr: increase(resend_email_events_total{event_type="email.failed"}[5m]) > 0
        labels:
          severity: critical
        annotations:
          summary: A transactional email failed to send
          description: >-
            {{ $value | printf "%.0f" }} email(s) from {{ $labels.from_domain }} failed in the last 5
            minutes. Check the exporter logs for the failure reason.

      - alert: ResendEmailBounced
        expr: increase(resend_email_events_total{event_type="email.bounced"}[5m]) > 0
        labels:
          severity: warning
        annotations:
          summary: A transactional email bounced
          description: >-
            {{ $value | printf "%.0f" }} email(s) from {{ $labels.from_domain }} to
            {{ $labels.to_domain }} bounced in the last 5 minutes.

      - alert: ResendDeliveryDelays
        expr: increase(resend_email_events_total{event_type="email.delivery_delayed"}[30m]) >= 3
        labels:
          severity: warning
        annotations:
          summary: Repeated email delivery delays
          description: >-
            {{ $value | printf "%.0f" }} delivery delays from {{ $labels.from_domain }} in the last 30
            minutes.

      - alert: ResendWebhookSignatureFailures
        expr: increase(resend_webhook_signature_failures_total[15m]) > 0
        labels:
          severity: warning
        annotations:
          summary: Resend webhook signature verification is failing
          description: >-
            Signature verification failed for incoming webhook requests. The webhook secret may be
            wrong or someone is sending unsigned traffic.
