name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - run: bun install --frozen-lockfile

      # semantic-release decides whether this push warrants a release. The
      # exec plugin builds the binaries (attached as GitHub release assets)
      # and exposes the version as a step output for the publish steps below.
      - name: semantic-release
        id: semantic
        run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to ghcr.io
        if: steps.semantic.outputs.version != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        if: steps.semantic.outputs.version != ''

      - name: Push Docker image
        if: steps.semantic.outputs.version != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.semantic.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.semantic.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Helm chart
        if: steps.semantic.outputs.version != ''
        env:
          VERSION: ${{ steps.semantic.outputs.version }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package charts/resend-exporter --version "$VERSION" --app-version "$VERSION"
          helm push "resend-exporter-$VERSION.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
