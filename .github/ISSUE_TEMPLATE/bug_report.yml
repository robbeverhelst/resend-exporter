name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 1.2.3 (image tag, chart version, or binary release)
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker
        - Helm
        - Standalone binary
        - docker-compose
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: JSON log lines around the problem. Redact anything sensitive.
      render: json
  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant environment variables or Helm values. Never include your webhook secret or API key.
