# Each webhook delivery lands on exactly one pod, so counters split across
# replicas and sum() in queries (as the bundled dashboard does) stays correct
# with any replica count.
replicaCount: 1

image:
  repository: ghcr.io/robbeverhelst/resend-exporter
  # Defaults to the chart appVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

resend:
  # The Resend webhook signing secret (whsec_...). Setting this creates a
  # Secret managed by the chart. Prefer existingSecret in production.
  webhookSecret: ""
  # Name of an existing Secret containing the webhook secret.
  existingSecret: ""
  # Key inside the existing Secret.
  existingSecretKey: webhook-secret

config:
  logLevel: info
  # strict | hash | none
  redactionMode: strict
  # Extra recipient domains that keep their own to_domain label value instead
  # of being bucketed into "other".
  toDomainAllowlist: []
  webhookPath: /webhooks/resend
  metricsPath: /metrics

# Extra environment variables for the container.
extraEnv: []

service:
  type: ClusterIP
  port: 8080

serviceMonitor:
  # Requires the Prometheus Operator CRDs.
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

prometheusRule:
  # Requires the Prometheus Operator CRDs. Ships default alerts for failed,
  # bounced, and repeatedly delayed emails plus webhook signature failures;
  # override the full rule list via prometheusRule.rules.
  enabled: false
  # Extra labels, e.g. the label your Prometheus ruleSelector matches
  # (kube-prometheus-stack default: release: <its release name>).
  labels: {}
  # Replaces the built-in rules entirely when set.
  rules: []

ingress:
  # Resend must be able to reach the webhook path from the internet.
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: resend-exporter.example.com
      paths:
        - path: /webhooks/resend
          pathType: Prefix
  tls: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /readyz
    port: http

nodeSelector: {}
tolerations: []
affinity: {}
