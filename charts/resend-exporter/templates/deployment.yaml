apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "resend-exporter.fullname" . }}
  labels:
    {{- include "resend-exporter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "resend-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "resend-exporter.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "resend-exporter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: exporter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: RESEND_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "resend-exporter.secretName" . }}
                  key: {{ include "resend-exporter.secretKey" . }}
            - name: RESEND_EXPORTER_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: RESEND_EXPORTER_REDACTION_MODE
              value: {{ .Values.config.redactionMode | quote }}
            - name: RESEND_EXPORTER_WEBHOOK_PATH
              value: {{ .Values.config.webhookPath | quote }}
            - name: RESEND_EXPORTER_METRICS_PATH
              value: {{ .Values.config.metricsPath | quote }}
            {{- with .Values.config.toDomainAllowlist }}
            - name: RESEND_EXPORTER_TO_DOMAIN_ALLOWLIST
              value: {{ join "," . | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
